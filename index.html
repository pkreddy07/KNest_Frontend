<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KNest - Knowledge Nest</title>
    <!-- Fonts and Icons -->
    <link rel="stylesheet" href="./src/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&family=Satisfy&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="./src/main.js" defer></script>
  </head>
  <body class="dark relative min-h-screen pb-12 overflow-x-hidden bg-[var(--bg-primary)] text-[var(--text-primary)] font-sans antialiased transition-colors duration-300">
    <!-- Background Decor (Adapted for light/dark) -->
    <div class="fixed top-[-20%] right-[-10%] w-[50%] h-[50%] bg-[var(--accent)] rounded-full mix-blend-multiply filter blur-[120px] opacity-10 pointer-events-none"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-purple-600 rounded-full mix-blend-multiply filter blur-[120px] opacity-10 pointer-events-none"></div>

    <!-- Navigation Bar Container -->
    <div id="nav-container"></div>

    <!-- Main View Container -->
    <main id="app" class="max-w-7xl mx-auto px-6 mt-24 fade-in">
        <!-- Content gets injected here -->
    </main>

    <!-- Global Toast/Alert Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>
  </body>
</html>
